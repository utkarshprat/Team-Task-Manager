<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectManager - Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">ProjectManager</div>
        <div class="user-info">
            <span id="welcome-msg">Welcome, User</span>
            <span id="user-role" class="badge">ROLE</span>
            <button class="btn btn-sm" id="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Projects Sidebar -->
        <aside class="card">
            <h3>
                Projects
                <button class="btn btn-sm admin-only" id="new-project-btn" style="background: var(--primary); display: none;">+ New</button>
            </h3>
            <ul class="project-list" id="project-list">
                <!-- Project items injected here -->
            </ul>
        </aside>

        <!-- Main Content (Tasks) -->
        <main class="card">
            <h3>
                <span id="current-project-title">Select a Project</span>
                <button class="btn btn-sm admin-only" id="new-task-btn" style="background: var(--primary); display: none;">+ Add Task</button>
            </h3>
            <div id="tasks-container">
                <!-- Task cards injected here -->
                <p style="color: var(--text-muted); text-align: center; margin-top: 40px;">Select a project to view tasks.</p>
            </div>
        </main>
    </div>

    <!-- Create Project Modal -->
    <div class="modal" id="project-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Project</h3>
                <span class="close-btn" id="close-project-modal">&times;</span>
            </div>
            <form id="project-form">
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" id="proj-name" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="proj-desc">
                </div>
                <button type="submit" class="btn">Create Project</button>
            </form>
        </div>
    </div>

    <!-- Create Task Modal -->
    <div class="modal" id="task-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Task</h3>
                <span class="close-btn" id="close-task-modal">&times;</span>
            </div>
            <form id="task-form">
                <div class="form-group">
                    <label>Task Title</label>
                    <input type="text" id="task-title" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="task-desc">
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="task-due" required>
                </div>
                <!-- Note: In a real app, you'd fetch users and have a dropdown for assignee -->
                <button type="submit" class="btn">Create Task</button>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
